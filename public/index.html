<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Claudette" />
  <meta name="theme-color" content="#1e1e2e" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <title>Claudette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Progrès</h2>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close panel">&#x2715;</button>
      </div>

      <div class="sidebar-section">
        <div class="lesson-meta" id="lessonMeta">
          <div class="meta-row"><span class="meta-label">Lesson</span><span class="meta-value" id="metaLesson">1</span></div>
          <div class="meta-row"><span class="meta-label">Source</span><span class="meta-value" id="metaBooklet">—</span></div>
          <div class="meta-row"><span class="meta-label">Focus</span><span class="meta-value" id="metaFocus">—</span></div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-section-title">Patterns</h3>
        <div class="pattern-legend">
          <span class="dot dot--mastered"></span> Mastered
          <span class="dot dot--learning"></span> Learning
          <span class="dot dot--new"></span> New
        </div>
        <div class="pattern-list" id="patternList"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="app-header">
        <div class="header-left">
          <button class="icon-btn" id="toggleSidebar" title="Lesson state">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="11" y2="15"/>
            </svg>
          </button>
          <svg class="flag-icon" width="28" height="28" viewBox="0 0 30 30" aria-hidden="true">
            <clipPath id="fc"><circle cx="15" cy="15" r="15"/></clipPath>
            <g clip-path="url(#fc)">
              <rect x="0"  y="0" width="10" height="30" fill="#002395"/>
              <rect x="10" y="0" width="10" height="30" fill="#ffffff"/>
              <rect x="20" y="0" width="10" height="30" fill="#ED2939"/>
            </g>
          </svg>
          <h1 class="app-title" id="appTitle">Claudette</h1>
        </div>
        <div class="header-controls">
          <button class="icon-btn" id="toggleSpeech" title="Toggle tutor speech">
            <svg id="speakerIcon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3,7 7,7 12,3 12,17 7,13 3,13"/><path d="M15 7.5a4 4 0 0 1 0 5"/><path d="M17.5 5a8 8 0 0 1 0 10"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="chat-area" id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
          <!-- Default view -->
          <div id="welcomeDefault">
            <p class="welcome-subtitle">Claudette, La Tutrice</p>
            <h2 class="welcome-heading">Bonjour</h2>
            <div class="welcome-continue-block">
              <p class="welcome-continue-label">Session <span id="welcomeSessionNum">1</span></p>
              <p class="welcome-recommend-label" id="welcomeRecommendLabel">up next</p>
              <p class="welcome-pattern-name" id="welcomePatternName">—</p>
            </div>
            <button class="btn-primary" id="startLesson">Continue</button>
            <button class="text-btn welcome-choose" id="welcomeChoose">Choose a different starting point</button>
          </div>
          <!-- Pattern picker view -->
          <div id="welcomePicker" style="display:none">
            <p class="welcome-subtitle">Choose where to start</p>
            <div class="picker-list" id="pickerList"></div>
            <button class="text-btn" id="welcomePickerBack">← Back</button>
          </div>
        </div>
      </div>

      <div class="input-area" id="inputArea" style="display:none">
        <div id="lessonInputPanel">
          <div class="input-row">
            <textarea
              id="userInput"
              class="user-input"
              placeholder="À vous…"
              rows="1"
              autocomplete="off"
              spellcheck="false"
            ></textarea>
            <button class="icon-btn mic-btn" id="micBtn" title="Speak your answer">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="7" y="2" width="6" height="10" rx="3"/>
                <path d="M3 10a7 7 0 0 0 14 0"/><line x1="10" y1="17" x2="10" y2="20"/>
              </svg>
            </button>
            <button class="send-btn" id="sendBtn">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="2" y1="10" x2="18" y2="10"/><polyline points="12,4 18,10 12,16"/>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            <button class="btn-secondary" id="saveAndExit">Save &amp; exit</button>
            <button class="btn-ghost" id="exitLesson">Exit</button>
            <span class="mic-status" id="micStatus"></span>
          </div>
        </div>
        <div id="postLessonPanel" style="display:none">
          <div id="coachFollowUpArea" style="display:none">
            <div class="input-row">
              <textarea
                id="coachInput"
                class="user-input"
                placeholder="Ask Claudette…"
                rows="1"
                autocomplete="off"
                spellcheck="false"
              ></textarea>
              <button class="send-btn" id="coachSendBtn">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="2" y1="10" x2="18" y2="10"/><polyline points="12,4 18,10 12,16"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="post-lesson-bar">
            <button class="btn-secondary" id="askCoachBtn">Ask a follow-up</button>
            <button class="btn-primary" id="returnHome">Start new session</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Pattern edit modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalPatternName">Pattern</h3>
        <button class="icon-btn" id="modalClose">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Status</label>
          <div class="status-options" id="statusOptions">
            <button class="status-opt" data-status="mastered">Mastered</button>
            <button class="status-opt" data-status="stabilizing">Learning</button>
            <button class="status-opt" data-status="exposure only">New</button>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" for="patternNotes">Notes</label>
          <textarea id="patternNotes" class="modal-textarea" rows="3" placeholder="Personal notes…"></textarea>
        </div>
        <div class="field-group">
          <label class="field-label">Examples</label>
          <ul class="example-list" id="modalExamples"></ul>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-start-here" id="modalStartHere">Start here next lesson</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="modalCancel">Cancel</button>
          <button class="btn-primary" id="modalSave">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
